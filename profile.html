<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile | Comic Pur</title>

<style>
:root {
  --primary: #00d4ff;
  --dark: #070b19;
  --card-bg: rgba(17, 24, 39, 0.8);
  --blue-btn: #00d4ff;
  --blue-btn-hover: #00b8e6;
  --danger: #ef4444;
  --success: #10b981;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

body {
  background-color: var(--dark);
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  padding: 15px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(7, 11, 25, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}
.brand-text { font-size: 20px; font-weight: 900; color: white; letter-spacing: 1px; }
.brand-text span { color: var(--primary); }
.back-btn {
  background-color: transparent; color: var(--primary); border: 1px solid var(--primary);
  padding: 6px 15px; border-radius: 8px; font-weight: 600; font-size: 14px;
  cursor: pointer; transition: 0.2s ease; text-decoration: none;
}
.back-btn:hover { background-color: rgba(0, 212, 255, 0.1); box-shadow: 0 0 10px rgba(0,212,255,0.4); }

/* AUTH & PROFILE CARD */
.main-content {
  flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px;
  background: radial-gradient(circle at center, rgba(0,212,255,0.05) 0%, transparent 70%);
}

.auth-card {
  background: var(--card-bg); border: 1px solid rgba(0, 212, 255, 0.2);
  box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); padding: 40px 30px; border-radius: 16px;
  width: 100%; max-width: 400px; text-align: center; backdrop-filter: blur(10px);
}

.auth-title { font-size: 24px; font-weight: 900; margin-bottom: 25px; color: white; letter-spacing: 1px;}
.auth-title span { color: var(--primary); }

.auth-input {
  width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5);
  color: white; outline: none; font-size: 14px; transition: 0.3s;
}
.auth-input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }

.action-btn {
  width: 100%; padding: 14px; border: none; border-radius: 8px;
  background-color: var(--blue-btn); color: #000; font-weight: 900; font-size: 15px;
  cursor: pointer; transition: 0.3s; margin-bottom: 10px; text-transform: uppercase;
}
.action-btn:hover { background-color: var(--blue-btn-hover); transform: translateY(-2px); box-shadow: 0 0 15px rgba(0,212,255,0.4);}
.btn-outline { background: transparent; border: 1px solid var(--blue-btn); color: var(--primary); }
.btn-outline:hover { background: rgba(0, 212, 255, 0.1); color: var(--primary); }
.btn-danger { background-color: transparent; border: 1px solid var(--danger); color: var(--danger); margin-top: 15px; }
.btn-danger:hover { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); }

/* Admin & VIP Badges */
.admin-badge {
  display: inline-block; background: #ffd700; color: #000; font-size: 12px;
  font-weight: bold; padding: 4px 10px; border-radius: 20px; margin-top: 5px; margin-bottom: 15px;
  box-shadow: 0 0 10px rgba(255,215,0,0.5);
}
.pass-status {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; color: #aaa;
}
.pass-active { color: var(--success); font-weight: bold; }
.pass-inactive { color: var(--danger); font-weight: bold; }
</style>
</head>
<body>

<header>
  <div class="brand-text">MY <span>ACCOUNT</span></div>
  <a href="index.html" class="back-btn">← Back</a>
</header>

<div class="main-content">
  
  <!-- LOGIN FORM -->
  <div class="auth-card" id="loginForm" style="display: none;">
    <div class="auth-title">USER <span>LOGIN</span></div>
    <input type="email" id="emailInp" class="auth-input" placeholder="Enter your Email" required>
    <input type="password" id="passInp" class="auth-input" placeholder="Enter your Password" required>
    
    <button class="action-btn" onclick="loginUser()">Sign In</button>
    <button class="action-btn btn-outline" onclick="registerUser()">Create Account</button>
    <p id="authError" style="color: var(--danger); font-size: 13px; margin-top: 10px; font-weight: bold;"></p>
  </div>

  <!-- PROFILE DASHBOARD -->
  <div class="auth-card" id="profileView" style="display: none;">
    <div style="font-size: 60px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,212,255,0.5);">🦸‍♂️</div>
    <div class="auth-title">WELCOME <span>BACK!</span></div>
    
    <p id="userEmailDisplay" style="font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 5px;"></p>
    <div id="tierDisplay"></div>
    
    <div class="pass-status" id="passStatusContainer">
       Checking Premium Pass Status...
    </div>

    <button id="adminBtn" class="action-btn" style="display: none; background: #ffd700; color: #000; box-shadow: 0 0 15px rgba(255,215,0,0.4);" onclick="window.location.href='admin.html'">⚙️ Open Admin Panel</button>
    
    <button class="action-btn btn-danger" onclick="logoutUser()">Sign Out</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  
  setPersistence(auth, browserLocalPersistence);

  // AUTH LOGIC
  const loginForm = document.getElementById('loginForm');
  const profileView = document.getElementById('profileView');
  const emailInp = document.getElementById('emailInp');
  const passInp = document.getElementById('passInp');
  const authError = document.getElementById('authError');
  const passStatusContainer = document.getElementById('passStatusContainer');

  window.loginUser = () => {
      authError.innerText = "";
      if(!emailInp.value || !passInp.value) { authError.innerText = "Please enter email and password."; return; }
      signInWithEmailAndPassword(auth, emailInp.value, passInp.value).catch(err => authError.innerText = err.message);
  };

  window.registerUser = () => {
      authError.innerText = "";
      if(!emailInp.value || !passInp.value) { authError.innerText = "Please enter email and password."; return; }
      createUserWithEmailAndPassword(auth, emailInp.value, passInp.value)
      .then(async (userCredential) => {
          // New user created, setup empty profile in database
          await setDoc(doc(db, "users", userCredential.user.uid), {
              email: emailInp.value,
              accessExpiresAt: 0
          });
      })
      .catch(err => authError.innerText = err.message);
  };

  window.logoutUser = () => signOut(auth);

  onAuthStateChanged(auth, async (user) => {
      if (user) {
          loginForm.style.display = 'none';
          profileView.style.display = 'block';
          document.getElementById('userEmailDisplay').innerText = user.email;
          
          if(user.email === "maxton480@gmail.com") {
              document.getElementById('tierDisplay').innerHTML = '<span class="admin-badge">👑 System Admin</span>';
              document.getElementById('adminBtn').style.display = 'block';
          } else {
              document.getElementById('tierDisplay').innerText = '';
              document.getElementById('adminBtn').style.display = 'none';
          }

          // Check Pass Status
          try {
              const userSnap = await getDoc(doc(db, "users", user.uid));
              if(userSnap.exists()) {
                  const data = userSnap.data();
                  const currentTime = Date.now();
                  if(data.accessExpiresAt && data.accessExpiresAt > currentTime) {
                      const hoursLeft = Math.floor((data.accessExpiresAt - currentTime) / (1000 * 60 * 60));
                      passStatusContainer.innerHTML = `Premium Pass: <span class="pass-active">ACTIVE</span><br>Expires in approx ${hoursLeft} hours.`;
                  } else {
                      passStatusContainer.innerHTML = `Premium Pass: <span class="pass-inactive">INACTIVE</span><br>Unlock from any premium chapter to read!`;
                  }
              } else {
                  // Fallback if doc doesn't exist
                  await setDoc(doc(db, "users", user.uid), { email: user.email, accessExpiresAt: 0 });
                  passStatusContainer.innerHTML = `Premium Pass: <span class="pass-inactive">INACTIVE</span>`;
              }
          } catch(e) {
              passStatusContainer.innerText = "Error loading pass status.";
          }

      } else {
          loginForm.style.display = 'block';
          profileView.style.display = 'none';
          emailInp.value = ""; passInp.value = ""; authError.innerText = "";
      }
  });

</script>
</body>
</html>
