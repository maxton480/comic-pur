<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comic Pur | Premium Reader</title>

<style>
:root { 
  --primary: #00d4ff; 
  --dark: #070b19; 
  --card-bg: #111827;
}
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
body { background-color: var(--dark); color: white; min-height: 100vh; padding-bottom: 20px;}

/* HEADER DESIGN */
header { 
  padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; 
  background: rgba(7, 11, 25, 0.95); border-bottom: 1px solid rgba(0, 212, 255, 0.2); 
  position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
}
.brand-text { font-size: 24px; font-weight: 900; color: white; letter-spacing: 1px; text-decoration: none;}
.brand-text span { color: var(--primary); }

.header-icons { display: flex; gap: 15px; align-items: center; }
.icon-btn { 
  background: transparent; color: var(--primary); border: none; 
  font-size: 20px; cursor: pointer; text-decoration: none; 
  display: flex; align-items: center; justify-content: center;
  transition: 0.2s;
}
.icon-btn:hover { transform: scale(1.1); text-shadow: 0 0 10px var(--primary); }
.icon-btn svg { fill: var(--primary); width: 24px; height: 24px; }

/* HERO BANNER */
.hero-banner {
  margin: 15px;
  padding: 40px 20px;
  background: linear-gradient(to right, #0f172a, #070b19);
  border-radius: 12px;
  border: 1px solid rgba(0, 212, 255, 0.2);
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,212,255,0.1);
}
.hero-banner::before {
  content: ''; position: absolute; top: -50%; right: -20%;
  width: 300px; height: 300px; background: rgba(0, 212, 255, 0.1);
  filter: blur(80px); border-radius: 50%; pointer-events: none;
}
.hero-title { font-size: 28px; font-weight: 900; margin-bottom: 10px; z-index: 10; position: relative;}
.hero-subtitle { font-size: 14px; color: #aaa; margin-bottom: 20px; max-width: 500px; margin-inline: auto; z-index: 10; position: relative;}

/* COMIC GRID */
.home-container { max-width: 1200px; margin: 0 auto; padding: 10px 15px; }
.section-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }
.comic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
@media (min-width: 768px) { .comic-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; } }

/* POSTER OVERLAY DESIGN */
.comic-card { position: relative; display: block; border-radius: 8px; overflow: hidden; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; aspect-ratio: 2/3; background: var(--card-bg);}
.comic-card:hover { transform: scale(1.03); border-color: var(--primary); z-index: 10; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);}
.comic-cover { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.3s;}
.overlay {
  position: absolute; bottom: 0; left: 0; width: 100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.95));
  padding: 15px 10px; display: flex; flex-direction: column; justify-content: flex-end;
}
.comic-title { font-size: 14px; font-weight: bold; color: white; margin-bottom: 4px; text-shadow: 1px 1px 4px black; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.comic-genre { font-size: 11px; color: #00d4ff; margin-bottom: 2px; font-weight: bold; }
.comic-eps { font-size: 11px; color: #aaa; font-weight: bold;}

.loading-msg { text-align: center; padding: 40px; color: var(--primary); grid-column: 1/-1; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="brand-text">COMIC <span>PUR</span></a>
  <div class="header-icons">
    <a href="search.html" class="icon-btn" title="Search Comics">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </a>
    <a href="profile.html" class="icon-btn" id="profileBtn" title="User Profile">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </a>
  </div>
</header>

<div class="hero-banner">
    <h1 class="hero-title">EXPLORE PREMIUM <span style="color: var(--primary);">MANHWA</span></h1>
    <p class="hero-subtitle">Dive into immersive stories. Unlock the entire library securely with our 24-Hour Access Pass!</p>
</div>

<div class="home-container">
  <div class="section-title">Latest Updates</div>
  <div class="comic-grid" id="mainGrid">
    <div class="loading-msg">Loading Library...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // AUTH STATE LISTENER - Secure UI Check
  onAuthStateChanged(auth, (user) => {
      const profileBtn = document.getElementById('profileBtn');
      if (user) {
          profileBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="#10b981"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
      } else {
          profileBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="#ef4444"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>`;
      }
  });

  async function fetchComics() {
      const grid = document.getElementById('mainGrid');
      try {
          const q = query(collection(db, "comics"), orderBy("updatedAt", "desc"));
          const snapshot = await getDocs(q);
          
          let allComicsData = [];
          snapshot.forEach((doc) => { allComicsData.push({ id: doc.id, ...doc.data() }); });
          
          renderGrid(allComicsData);
      } catch (error) { 
          grid.innerHTML = `<div class="loading-msg">Error loading library.</div>`; 
      }
  }

  function renderGrid(comicsArray) {
      const grid = document.getElementById('mainGrid');
      grid.innerHTML = "";
      if(comicsArray.length === 0) { grid.innerHTML = `<div class="loading-msg">No results found.</div>`; return; }

      comicsArray.forEach((comic) => {
          const epCount = comic.episodes ? comic.episodes.length : 0;
          
          grid.innerHTML += `
              <a href="comic.html?id=${comic.id}" class="comic-card">
                  <img src="${comic.coverUrl}" class="comic-cover" alt="${comic.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'">
                  <div class="overlay">
                      <div class="comic-title">${comic.title}</div>
                      <div class="comic-genre">${comic.genre || 'Webtoon'}</div>
                      <div class="comic-eps">Episodes: ${epCount}</div>
                  </div>
              </a>
          `;
      });
  }

  fetchComics();
</script>
</body>
</html>
