<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search Comics | Comic Pur</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-PYHWPM2BM4"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-PYHWPM2BM4');

<style>
:root {
  --primary: #00d4ff;
  --dark: #070b19;
  --card-bg: #111827;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

body {
  background-color: var(--dark);
  color: white;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* HEADER & NAVIGATION */
header {
  padding: 15px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(7, 11, 25, 0.95);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}
.brand-text { font-size: 20px; font-weight: 900; color: white; letter-spacing: 1px; }
.brand-text span { color: var(--primary); }

.back-btn {
  background-color: transparent; color: var(--primary); border: 1px solid var(--primary);
  padding: 6px 15px; border-radius: 8px; font-weight: 600; font-size: 14px;
  cursor: pointer; transition: 0.2s ease; text-decoration: none;
}
.back-btn:hover { background-color: rgba(0, 212, 255, 0.1); box-shadow: 0 0 10px rgba(0,212,255,0.4); }

/* SEARCH BAR UI */
.search-container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
.search-input-wrapper { display: flex; gap: 10px; }
.search-input {
  flex-grow: 1; padding: 15px 20px; border-radius: 10px; border: 1px solid rgba(0, 212, 255, 0.3);
  background: rgba(255, 255, 255, 0.05); color: white; font-size: 16px; outline: none; transition: 0.3s;
}
.search-input:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }

/* COMIC GRID */
.container { padding: 10px 20px 20px; max-width: 1200px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }

.card {
  position: relative; border-radius: 10px; overflow: hidden; cursor: pointer;
  background: var(--card-bg); transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.05);
}
.card:hover { transform: scale(1.03); border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);}
.card img { width: 100%; aspect-ratio: 2 / 3; object-fit: cover; display: block; }
.overlay {
  position: absolute; bottom: 0; width: 100%; padding: 20px 10px 10px;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 40%, transparent);
}
.title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.episodes { font-size: 11px; color: var(--primary); margin-top: 4px; font-weight: 600; }

#statusMessage { text-align: center; padding: 30px; color: #ccc; grid-column: 1 / -1; font-weight: bold;}
</style>
</head>
<body>

<header>
  <div class="brand-text">🔍 SEARCH <span>COMICS</span></div>
  <a href="index.html" class="back-btn">← Back</a>
</header>

<div class="search-container">
  <div class="search-input-wrapper">
    <input type="text" id="searchInput" class="search-input" placeholder="Type comic title or genre to search...">
  </div>
</div>

<div class="container">
  <div class="grid" id="searchResults">
      <div id="statusMessage">Start typing to find your favorite comics...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const list = document.getElementById("searchResults");
  const searchInput = document.getElementById("searchInput");
  let allComicsData = [];

  // Fetch data in background
  async function loadAllComics() {
      document.getElementById('statusMessage').innerText = "Loading database...";
      try {
          const querySnapshot = await getDocs(collection(db, "comics"));
          allComicsData = [];
          querySnapshot.forEach((doc) => {
              allComicsData.push({ id: doc.id, ...doc.data() });
          });
          document.getElementById('statusMessage').innerText = `Type to search! Library loaded.`;
      } catch (error) {
          document.getElementById('statusMessage').innerHTML = `<span style="color:var(--danger);">Error connecting to database.</span>`;
      }
  }

  function renderResults(filteredComics) {
      list.innerHTML = "";
      
      if (filteredComics.length === 0) {
          list.innerHTML = `<div id="statusMessage">No comics found matching your search.</div>`;
          return;
      }

      filteredComics.forEach((data) => {
          const epCount = data.episodes ? data.episodes.length : 0;
          
          list.innerHTML += `
              <div class="card" onclick="window.location.href='comic.html?id=${data.id}'">
                  <img src="${data.coverUrl || 'https://via.placeholder.com/300x450'}" alt="${data.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Cover'">
                  <div class="overlay">
                      <div class="title">${data.title || 'Unknown Title'}</div>
                      <div class="episodes">${epCount} Episodes | ${data.genre || 'Webtoon'}</div>
                  </div>
              </div>
          `;
      });
  }

  searchInput.addEventListener("input", (e) => {
      const searchTerm = e.target.value.toLowerCase().trim();
      
      if (searchTerm === "") {
          list.innerHTML = `<div id="statusMessage">Start typing to find your favorite comics...</div>`;
          return;
      }

      const filtered = allComicsData.filter(comic => {
          const titleMatch = comic.title && comic.title.toLowerCase().includes(searchTerm);
          const genreMatch = comic.genre && comic.genre.toLowerCase().includes(searchTerm);
          return titleMatch || genreMatch;
      });

      renderResults(filtered);
  });

  loadAllComics();
</script>
</body>
</html>
