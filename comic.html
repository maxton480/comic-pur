<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comic Details | Comic Pur</title>
<style>
  :root { 
    --primary: #00d4ff; --dark: #070b19; --card-bg: #111827; 
    --danger: #ef4444; --text-muted: #9ca3af;
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background-color: var(--dark); color: white; min-height: 100vh; display: flex; flex-direction: column; }
  
  /* NAVBAR */
  header { 
    background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 10;
    padding: 15px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    display: flex; justify-content: space-between; align-items: center; 
  }
  .brand { font-size: 22px; font-weight: 900; color: white; text-decoration: none; letter-spacing: 1px; }
  .brand span { color: var(--primary); }
  
  .nav-links { display: flex; align-items: center; gap: 15px; }
  .nav-btn { color: white; text-decoration: none; font-weight: 600; font-size: 14px; padding: 6px 12px; border-radius: 6px; transition: 0.2s; }
  .nav-btn:hover { color: var(--primary); }

  /* MAIN CONTENT (Hidden until verified) */
  #mainContent { display: none; flex-grow: 1; padding: 20px; max-width: 1000px; width: 100%; margin: 0 auto; }
  
  /* COMIC INFO HEADER */
  .comic-header { display: flex; flex-direction: column; gap: 20px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; }
  @media(min-width: 600px) { .comic-header { flex-direction: row; } }
  
  .comic-cover { width: 140px; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; border: 2px solid rgba(255,255,255,0.1); flex-shrink: 0; margin: 0 auto; }
  @media(min-width: 600px) { .comic-cover { margin: 0; width: 180px; } }
  
  .comic-details { display: flex; flex-direction: column; justify-content: center; flex-grow: 1; text-align: center; }
  @media(min-width: 600px) { .comic-details { text-align: left; } }
  
  .comic-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: var(--primary); }
  .comic-genre { display: inline-block; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 15px; width: fit-content; margin-left: auto; margin-right: auto; }
  @media(min-width: 600px) { .comic-genre { margin-left: 0; margin-right: 0; } }
  
  .comic-summary { font-size: 14px; color: #ccc; line-height: 1.6; }

  /* CHAPTERS LIST */
  .section-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }
  .chapter-list { display: flex; flex-direction: column; gap: 10px; }
  .chapter-item { background: var(--card-bg); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
  .chapter-item:hover { background: rgba(0, 212, 255, 0.1); border-color: var(--primary); transform: translateX(5px); }
  .chapter-title { font-weight: 600; font-size: 15px; }
  .read-btn { background: var(--primary); color: #000; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }

  /* LOADING STATE */
  .loader-container { display: flex; justify-content: center; align-items: center; height: 50vh; color: var(--primary); font-weight: bold; font-size: 18px; }

  /* 🔥 18+ WARNING POPUP (AGE GATE) 🔥 */
  .age-gate-overlay { 
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); 
    backdrop-filter: blur(15px); z-index: 1000; 
    display: none; justify-content: center; align-items: center; padding: 20px; 
  }
  .age-gate-card { 
    background: #111; border: 2px solid var(--danger); border-radius: 12px; 
    padding: 30px; text-align: center; max-width: 400px; width: 100%; 
    box-shadow: 0 10px 40px rgba(239, 68, 68, 0.3); 
  }
  .age-gate-icon { font-size: 50px; margin-bottom: 15px; text-shadow: 0 0 15px var(--danger); }
  .age-gate-title { color: white; font-size: 22px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
  .age-gate-title span { color: var(--danger); }
  .age-gate-desc { color: #aaa; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
  
  .age-gate-btns { display: flex; gap: 15px; }
  .btn-yes, .btn-no { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
  .btn-yes { background: var(--danger); color: white; }
  .btn-yes:hover { background: #b91c1c; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
  .btn-no { background: #333; color: white; }
  .btn-no:hover { background: #444; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="brand">COMIC <span>PUR</span></a>
  <div class="nav-links">
     <a href="index.html" class="nav-btn">← Home</a>
  </div>
</header>

<!-- LOADING SCREEN -->
<div id="loader" class="loader-container">Loading Comic Details...</div>

<!-- MAIN COMIC CONTENT -->
<div id="mainContent">
    <div class="comic-header">
        <img id="cCover" class="comic-cover" src="" alt="Cover">
        <div class="comic-details">
            <h1 id="cTitle" class="comic-title">-</h1>
            <span id="cGenre" class="comic-genre">-</span>
            <p id="cSummary" class="comic-summary">-</p>
        </div>
    </div>

    <h2 class="section-title">Chapters</h2>
    <div id="chaptersList" class="chapter-list">
        <!-- Chapters will be injected here -->
    </div>
</div>

<!-- 🔥 18+ AGE GATE POPUP 🔥 -->
<div id="ageGateOverlay" class="age-gate-overlay">
    <div class="age-gate-card">
        <div class="age-gate-icon">🔞</div>
        <div class="age-gate-title"><span>Warning:</span> Adult Content</div>
        <p class="age-gate-desc">This comic contains mature themes and is restricted to readers 18 years and older. Are you 18 or older?</p>
        <div class="age-gate-btns">
            <button class="btn-yes" onclick="verifyAge()">Yes, I am 18+</button>
            <button class="btn-no" onclick="goBack()">No, take me back</button>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let comicData = null;

  // Global functions for buttons
  window.verifyAge = () => {
      // Session storage mein save kar do taaki reader se wapas aane par popup na aaye
      sessionStorage.setItem('adult_verified', 'true');
      document.getElementById('ageGateOverlay').style.display = "none";
      renderComicData();
  };

  window.goBack = () => {
      window.location.href = "index.html";
  };

  async function loadComic() {
      const urlParams = new URLSearchParams(window.location.search);
      const comicId = urlParams.get('id');
      
      if(!comicId) {
          document.getElementById('loader').innerText = "Comic Not Found!";
          return;
      }

      try {
          const docSnap = await getDoc(doc(db, "comics", comicId));
          if(docSnap.exists()) {
              comicData = docSnap.data();
              
              // 🔥 CHECK FOR 18+ TAG 🔥
              if(comicData.isAdult === true) {
                  // Agar user ne pehle 'Yes' nahi dabaya hai is session mein, toh popup dikhao
                  if(sessionStorage.getItem('adult_verified') !== 'true') {
                      document.getElementById('loader').style.display = "none";
                      document.getElementById('ageGateOverlay').style.display = "flex";
                      return; // Stop rendering until verified
                  }
              }
              
              // Agar 18+ nahi hai, ya user already verified hai, toh direct render karo
              renderComicData();
              
          } else {
              document.getElementById('loader').innerText = "Comic Not Found!";
          }
      } catch (err) {
          console.error(err);
          document.getElementById('loader').innerText = "Error loading database.";
      }
  }

  function renderComicData() {
      document.getElementById('loader').style.display = "none";
      document.getElementById('mainContent').style.display = "block";
      
      const urlParams = new URLSearchParams(window.location.search);
      const comicId = urlParams.get('id');

      document.getElementById('cCover').src = comicData.coverUrl || "https://via.placeholder.com/200x300?text=No+Cover";
      document.getElementById('cTitle').innerText = comicData.title || "Untitled";
      document.getElementById('cGenre').innerText = comicData.genre || "Story";
      document.getElementById('cSummary').innerText = comicData.summary || "No description available.";

      const chList = document.getElementById('chaptersList');
      chList.innerHTML = "";
      
      let eps = comicData.episodes || [];
      if(eps.length === 0) {
          chList.innerHTML = `<div style="color:#aaa; padding:10px;">No chapters uploaded yet.</div>`;
          return;
      }

      eps.forEach((ep, index) => {
          chList.innerHTML += `
             <a href="reader.html?comic=${comicId}&ch=${index}" class="chapter-item">
                <span class="chapter-title">Ch ${index + 1}: ${ep.title}</span>
                <span class="read-btn">Read</span>
             </a>
          `;
      });
  }

  // Start process
  loadComic();
</script>
</body>
</html>
