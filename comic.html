<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
:root {
  --primary: #00d4ff; --dark: #070b19; --card-bg: #111827;
  --success: #10b981; --danger: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
body { background-color: var(--dark); color: white; min-height: 100vh; padding-bottom: 40px; }

/* HEADER */
header {
  padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(7, 11, 25, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid rgba(0, 212, 255, 0.2);
}
.brand-text { font-size: 20px; font-weight: 900; color: white; text-decoration: none; letter-spacing: 1px;}
.brand-text span { color: var(--primary); }
.back-btn { background-color: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 6px 15px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s ease; text-decoration: none; }
.back-btn:hover { background-color: rgba(0, 212, 255, 0.1); box-shadow: 0 0 10px rgba(0,212,255,0.4); }

/* HERO MAIN BOARD */
.comic-hero { max-width: 1000px; margin: 20px auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; background: var(--card-bg); border-radius: 12px; border: 1px solid rgba(0, 212, 255, 0.2); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
@media (min-width: 600px) { .comic-hero { flex-direction: row; align-items: flex-start; } }
.comic-cover { width: 100%; max-width: 220px; aspect-ratio: 2/3; object-fit: cover; border-radius: 10px; border: 2px solid var(--primary); margin: 0 auto; display: block; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
.comic-details { flex-grow: 1; text-align: center; }
@media (min-width: 600px) { .comic-details { text-align: left; } }
.comic-title { font-size: 26px; font-weight: 900; margin-bottom: 10px; color: white; text-shadow: 1px 1px 3px black;}
.comic-meta { font-size: 14px; color: #ccc; margin-bottom: 8px; }
.comic-meta span { color: var(--primary); font-weight: bold; }

/* SUMMARY BOX DESIGN */
.comic-summary {
  margin-top: 15px; color: #ddd; line-height: 1.6; font-size: 14px; text-align: justify;
  background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 8px;
  border-left: 3px solid var(--primary);
}

/* CONTROLS SCREEN */
.controls-bar { max-width: 1000px; margin: 15px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; }
.search-ep-input { padding: 10px 15px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0, 212, 255, 0.3); color: white; font-size: 14px; outline: none; width: 100%; max-width: 250px; }
.search-ep-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
.sort-btn { padding: 10px 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
.sort-btn:hover { border-color: var(--primary); color: var(--primary); }

/* BATCH TABS */
.batch-container { max-width: 1000px; margin: 10px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 8px; }
.batch-tab { padding: 6px 14px; background: #1e293b; border: 1px solid transparent; color: #ccc; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; }
.batch-tab.active { background: var(--primary); color: #000; border-color: var(--primary); }

/* EPISODES GRID */
.episodes-section { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
.ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
.ep-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; text-decoration: none; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 13px; font-weight: 600; }
.ep-card:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,212,255,0.1);}

.free-card { border-color: rgba(16, 185, 129, 0.3); }
.free-card:hover { border-color: var(--success); background: rgba(16, 185, 129, 0.05); }
.locked-card { border-color: rgba(239, 68, 68, 0.3); color: #ccc; }
.locked-card:hover { border-color: var(--danger); background: rgba(239, 68, 68, 0.05); }

</style>
</head>
<body>

<header>
  <a href="index.html" class="brand-text">COMIC <span>PUR</span></a>
  <a href="index.html" class="back-btn">← Home</a>
</header>

<div class="comic-hero">
  <img id="comicCover" class="comic-cover" src="https://via.placeholder.com/200x300" alt="Loading Cover..." onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'">
  <div class="comic-details">
    <h1 id="comicTitle" class="comic-title">Loading...</h1>
    <div class="comic-meta">Genre: <span id="comicGenre">-</span></div>
    <div class="comic-meta">Total Chapters: <span id="comicTotalEps">0</span></div>
    
    <div class="comic-summary" id="comicSummary">Loading summary...</div>
  </div>
</div>

<div class="controls-bar">
  <input type="text" id="searchEp" class="search-ep-input" placeholder="🔍 Type Ep Number (e.g., 45)...">
  <button id="sortBtn" class="sort-btn" onclick="toggleSort()">Sort: Oldest First ⬇️</button>
</div>

<div class="batch-container" id="batchTabs"></div>

<div class="episodes-section">
  <div class="ep-grid" id="episodesGrid"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let allEpisodes = [], currentComicId = "", isDescending = false, activeBatchIndex = 0;
  let userHasPass = false; 
  const chunkSize = 50;

  onAuthStateChanged(auth, async (user) => {
      if(user) {
          try {
              const userSnap = await getDoc(doc(db, "users", user.uid));
              if(userSnap.exists() && userSnap.data().accessExpiresAt > Date.now()) {
                  userHasPass = true; 
              }
          } catch(e) { console.error("Error checking pass status."); }
      }
      loadComicDetails();
  });

  async function loadComicDetails() {
      const urlParams = new URLSearchParams(window.location.search);
      currentComicId = urlParams.get('id');
      if(!currentComicId) return window.location.href = 'index.html';

      try {
          const docSnap = await getDoc(doc(db, "comics", currentComicId));
          if(docSnap.exists()) {
              const data = docSnap.data();
              document.getElementById('comicTitle').innerText = data.title || "Untitled";
              document.getElementById('comicGenre').innerText = data.genre || "N/A";
              document.getElementById('comicCover').src = data.coverUrl || "https://via.placeholder.com/200x300";
              document.getElementById('comicSummary').innerText = data.summary || "No summary available for this comic yet.";
              
              allEpisodes = data.episodes || [];
              document.getElementById('comicTotalEps').innerText = allEpisodes.length;

              renderBatchTabs();
              renderEpisodes();
          }
      } catch (err) { console.error(err); }
  }

  function renderBatchTabs() {
      const container = document.getElementById('batchTabs'); container.innerHTML = "";
      if(allEpisodes.length <= chunkSize) return;

      const totalBatches = Math.ceil(allEpisodes.length / chunkSize);
      for(let i = 0; i < totalBatches; i++) {
          const start = i * chunkSize + 1, end = Math.min((i + 1) * chunkSize, allEpisodes.length);
          const tab = document.createElement('button');
          tab.className = `batch-tab ${i === activeBatchIndex ? 'active' : ''}`;
          tab.innerText = `${start} - ${end}`;
          tab.onclick = () => { activeBatchIndex = i; document.getElementById('searchEp').value = ""; renderBatchTabs(); renderEpisodes(); };
          container.appendChild(tab);
      }
  }

  window.renderEpisodes = () => {
      const grid = document.getElementById('episodesGrid'); grid.innerHTML = "";
      if(allEpisodes.length === 0) { grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#aaa;">No chapters uploaded yet.</div>`; return; }

      let indexedEps = allEpisodes.map((ep, originalIndex) => ({ ...ep, originalIndex }));
      const searchVal = document.getElementById('searchEp').value.toLowerCase().trim();
      
      if(searchVal !== "") {
          indexedEps = indexedEps.filter(ep => ep.title.toLowerCase().includes(searchVal));
          document.getElementById('batchTabs').style.display = "none";
      } else {
          document.getElementById('batchTabs').style.display = "flex";
          indexedEps = indexedEps.slice(activeBatchIndex * chunkSize, (activeBatchIndex * chunkSize) + chunkSize);
      }

      if (isDescending) indexedEps.reverse();

      indexedEps.forEach((ep) => {
          const statusBadge = userHasPass 
              ? `<span style="font-size: 9px; background: #10b981; color: #000; padding: 2px 4px; border-radius: 4px;">UNLOCKED</span>` 
              : `<span title="Requires Pass">🔒</span>`;
          const cardClass = userHasPass ? 'ep-card free-card' : 'ep-card locked-card';

          grid.innerHTML += `
              <a class="${cardClass}" href="reader.html?id=${currentComicId}&ep=${ep.originalIndex}">
                  <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%;">${ep.title || `Chapter ${ep.originalIndex + 1}`}</span>
                  ${statusBadge}
              </a>
          `;
      });
  };

  window.toggleSort = () => {
      isDescending = !isDescending;
      document.getElementById('sortBtn').innerHTML = isDescending ? "Sort: Latest First ⬆️" : "Sort: Oldest First ⬇️";
      renderEpisodes();
  };
  
  document.getElementById('searchEp').addEventListener('input', () => renderEpisodes());
</script>
</body>
</html>
